<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>PetLog Lite - Offline Pet Health & Care Tracker</title>
<meta name="description" content="PetLog is an offline pet health and care tracker for profiles, vaccines, medications, meals, vet visits, daily notes, costs, and emergency cards.">
<style>
:root{--brand:#E8976D;--cream:#F5E6D3;--coffee:#8B6F4E;--green:#4A9B7F;--blue:#5E96B7;--ink:#34251e;--muted:#715b4d;--paper:#fffaf4;--line:#ead8c6;--warn:#9b341d;--ok:#245f47;--focus:#193b7a}
*{box-sizing:border-box}
html{scroll-behavior:smooth}
body{margin:0;background:linear-gradient(180deg,var(--cream),#fffaf4 34%,#fff);color:var(--ink);font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;font-size:17px;line-height:1.45}
button,input,select,textarea{font:inherit}
button,a,input,select,textarea{outline-color:var(--focus)}
button{border:0;cursor:pointer}
.app{max-width:1220px;margin:0 auto;padding:18px}
.top{display:grid;grid-template-columns:1fr auto;gap:18px;align-items:center;padding:18px 0 14px}
.brand{display:flex;gap:13px;align-items:center}
.logo{width:54px;height:54px;border-radius:8px;background:var(--brand);display:grid;place-items:center;color:#2d1d16;font-size:28px;box-shadow:0 8px 18px #8b6f4e30}
h1,h2,h3,p{margin-top:0}
h1{font-size:clamp(1.7rem,3vw,2.6rem);margin:0;color:#2b1d17;letter-spacing:0}
.tag{margin:.15rem 0 0;color:var(--muted)}
.price{background:#fff;border:2px solid var(--coffee);border-radius:8px;padding:9px 13px;font-weight:800;color:#3c281f}
.toolbar{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between;margin:4px 0 14px}
.pet-select{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
select,input,textarea{border:1.5px solid #c9ad95;border-radius:8px;background:#fff;color:var(--ink);padding:10px 12px;min-height:44px}
textarea{width:100%;min-height:92px;resize:vertical}
label{display:grid;gap:6px;color:#4d3b31;font-weight:700}
.hint{font-size:.88rem;color:var(--muted);font-weight:500}
.tabs{display:flex;gap:8px;overflow:auto;padding:4px 0 12px;margin-bottom:8px}
.tab{white-space:nowrap;border:1.5px solid #d5bda9;background:#fff7ef;color:#4a352b;border-radius:8px;padding:10px 12px;font-weight:800}
.tab[aria-current=true]{background:var(--coffee);color:#fff;border-color:var(--coffee)}
.banner,.alerts{border:2px solid var(--brand);background:#fff6ed;border-radius:8px;padding:13px 15px;margin:10px 0;color:#3d291f}
.alerts{border-color:#d56b4a;background:#fff1e9}
.view{background:rgba(255,255,255,.84);border:1px solid var(--line);border-radius:8px;padding:18px;box-shadow:0 14px 36px #8b6f4e18}
.grid{display:grid;grid-template-columns:repeat(12,1fr);gap:14px}
.col-12{grid-column:span 12}.col-8{grid-column:span 8}.col-6{grid-column:span 6}.col-4{grid-column:span 4}.col-3{grid-column:span 3}
.panel{background:#fff;border:1px solid var(--line);border-radius:8px;padding:15px}
.panel h2,.panel h3{margin-bottom:10px}
.row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.stack{display:grid;gap:12px}
.actions{display:flex;gap:9px;flex-wrap:wrap;align-items:center}
.btn{border-radius:8px;padding:10px 13px;background:var(--coffee);color:#fff;font-weight:800;min-height:44px;display:inline-flex;gap:7px;align-items:center;justify-content:center}
.btn.secondary{background:#fff;color:#3e2d24;border:1.5px solid #c9ad95}
.btn.good{background:var(--green)}
.btn.warn{background:#9b4c2d;color:#fff}
.btn.small{padding:7px 9px;min-height:36px;font-size:.92rem}
.btn:focus-visible,.tab:focus-visible{outline:3px solid var(--focus);outline-offset:2px}
.pet-photo{width:148px;height:148px;border-radius:8px;background:#f6eadf;border:2px dashed #c9ad95;object-fit:cover;display:grid;place-items:center;color:#705447;text-align:center}
.pet-tile{display:flex;gap:12px;align-items:center;border:1px solid var(--line);border-radius:8px;padding:10px;background:#fff}
.mini-photo{width:58px;height:58px;border-radius:8px;object-fit:cover;background:#f6eadf;display:grid;place-items:center}
.kpi{display:grid;gap:4px;background:#fff9f0;border:1px solid var(--line);border-radius:8px;padding:12px}
.kpi strong{font-size:1.35rem}
table{width:100%;border-collapse:collapse;background:#fff;border-radius:8px;overflow:hidden}
th,td{padding:10px;border-bottom:1px solid var(--line);text-align:left;vertical-align:top}
th{background:#fff1e5;color:#3c2a22}
tr:last-child td{border-bottom:0}
.scroll{overflow:auto}
.empty{border:2px dashed #d1b8a3;border-radius:8px;padding:22px;text-align:center;background:#fffaf5}
canvas{width:100%;height:280px;border:1px solid var(--line);border-radius:8px;background:#fff}
.pill{display:inline-flex;align-items:center;gap:6px;border-radius:999px;padding:4px 9px;background:#f7eadf;color:#4a352b;font-size:.9rem;font-weight:800}
.due-overdue{background:#ffe3dc;color:#7a1d11}.due-soon{background:#fff0c2;color:#5d4300}.due-ok{background:#e7f4ec;color:#20513e}
.disclaimer{font-size:.92rem;color:#5c493d;border-left:4px solid var(--brand);padding:9px 12px;background:#fff9f1;border-radius:0 8px 8px 0}
.emoji-set{display:flex;gap:8px;flex-wrap:wrap}
.emoji-set button{width:48px;height:48px;border-radius:8px;background:#fff;border:1.5px solid #c9ad95;font-size:1.3rem}
.emoji-set button.active{background:var(--brand);border-color:#7b4b30}
.calendar{display:grid;grid-template-columns:repeat(7,minmax(88px,1fr));gap:8px}
.day{min-height:86px;border:1px solid var(--line);background:#fff;border-radius:8px;padding:8px}
.day strong{display:block}.dot{display:inline-block;width:9px;height:9px;border-radius:50%;background:var(--green);margin-right:4px}
.print-card{background:#fff;border:1px solid var(--line);border-radius:8px;padding:18px}
.emergency{display:grid;grid-template-columns:190px 1fr;gap:18px;align-items:start;border:3px solid var(--coffee)}
.emergency .pet-photo{width:190px;height:190px}
.sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0}
footer{padding:22px 0;color:var(--muted);font-size:.92rem}
@media(max-width:820px){.top,.toolbar{grid-template-columns:1fr}.grid{display:block}.grid>*{margin-bottom:14px}.col-12,.col-8,.col-6,.col-4,.col-3{grid-column:auto}.calendar{grid-template-columns:repeat(2,1fr)}.emergency{grid-template-columns:1fr}.pet-photo,.emergency .pet-photo{width:132px;height:132px}.view{padding:13px}.app{padding:12px}}
@media(max-width:520px){body{font-size:16px}.tabs{gap:6px}.tab{padding:9px 10px}.calendar{grid-template-columns:1fr}.top{display:block}.price{display:inline-block;margin-top:10px}.pet-select select{width:100%}}
@media print{body{background:#fff;color:#000}.top,.toolbar,.tabs,.actions,.banner,.alerts,.no-print,footer{display:none!important}.app{max-width:none;padding:0}.view,.panel,.print-card{box-shadow:none;border-color:#bbb}.view{border:0;padding:0}.print-card{break-inside:avoid;margin-bottom:12px}a{color:#000;text-decoration:none}canvas{display:none}.emergency{page-break-inside:avoid}}
</style>
</head>
<body>
<div id="app" class="app"></div>
<script>
const APP={pro:false,title:"PetLog Lite",store:"petlog_lite_v1",maxPets:2,price:"Free"};
const SPECIES=["Dog","Cat","Rabbit","Hamster","Guinea Pig","Bird","Other"];
const SEX=["Unknown","Female","Male"];
const THEMES={orange:{brand:"#E8976D",cream:"#F5E6D3",coffee:"#8B6F4E",green:"#4A9B7F"},forest:{brand:"#4A9B7F",cream:"#EAF3E6",coffee:"#4E6B4B",green:"#2F7D5D"},blue:{brand:"#73A9CF",cream:"#EAF4FA",coffee:"#4D6F86",green:"#4A9B7F"}};
const VAX={Dog:[["DHPP","Core","At least 3 puppy doses 6-16 weeks, then booster within 1 year, then every 3 years."],["Rabies","Core","Follow local law and product label."],["Leptospirosis","Core","AAHA updated canine guidance in 2024 to include leptospirosis as core for dogs; typically annual after initial series."],["Bordetella","Lifestyle","Often annual for dogs with boarding, grooming, daycare, training, or exposure risk."],["Lyme","Lifestyle","Risk-based; often annual after initial series in endemic areas."],["Canine Influenza","Lifestyle","Risk-based; initial 2-dose series, then annual where indicated."]],Cat:[["FVRCP","Core","Kitten series from 6 weeks every 3-4 weeks until 16-20 weeks; revaccinate then every 3 years for many adult cats."],["Rabies","Core","Frequency depends on local law and product label."],["FeLV","Core for kittens","Core for cats under 1 year; risk-based for adults, with testing before vaccination."]]};
const PREVENTS=["Heartworm","Flea & tick"];
let state=loadState(), tab="profiles", currentPetId=state.pets[0]?.id||null, noteMonth=(new Date()).toISOString().slice(0,7);
function uid(){return Math.random().toString(36).slice(2,10)+Date.now().toString(36).slice(-4)}
function blankPet(){return{id:uid(),name:"New pet",species:"Dog",breed:"",birthDate:"",adoptionDate:"",sex:"Unknown",neutered:"Unknown",microchip:"",notes:"",vetContact:"",ownerContact:"",insurance:"",photo:"",targetWeight:"",foodRestrictions:"",weight:[],vaccines:[],preventatives:[],meds:[],feeding:[],diet:[],visits:[],notesLog:[],costs:[]}}
function loadState(){try{let raw=localStorage.getItem(APP.store);if(raw)return JSON.parse(raw)}catch(e){}return{version:1,settings:{unit:"lb",temp:"F",theme:"orange"},pets:[]}}
function save(){localStorage.setItem(APP.store,JSON.stringify(state));render()}
function pet(){return state.pets.find(p=>p.id===currentPetId)||state.pets[0]||null}
function h(s){return String(s??"").replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[m]))}
function iso(d=new Date()){return d.toISOString().slice(0,10)}
function addDays(d,n){let x=new Date(d+"T00:00:00");x.setDate(x.getDate()+n);return iso(x)}
function daysUntil(d){return Math.ceil((new Date(d+"T00:00:00")-new Date(iso()+"T00:00:00"))/86400000)}
function money(n){return "$"+(Number(n)||0).toFixed(2)}
function lbToKg(v){return Number(v)*0.45359237}
function kgToLb(v){return Number(v)/0.45359237}
function displayWeight(lb){return state.settings.unit==="kg"?lbToKg(lb):Number(lb)}
function inputWeight(v){return state.settings.unit==="kg"?kgToLb(v):Number(v)}
function download(name,text,type="text/plain"){let a=document.createElement("a");a.href=URL.createObjectURL(new Blob([text],{type}));a.download=name;a.click();setTimeout(()=>URL.revokeObjectURL(a.href),800)}
function csv(rows){return rows.map(r=>r.map(v=>`"${String(v??"").replace(/"/g,'""')}"`).join(",")).join("\n")}
function setTheme(){let t=THEMES[state.settings.theme]||THEMES.orange;for(let k in t)document.documentElement.style.setProperty("--"+k,t[k])}
function seedHealth(p){let list=VAX[p.species]||[];let names=new Set(p.vaccines.map(v=>v.name));list.forEach(x=>{if(!names.has(x[0]))p.vaccines.push({id:uid(),name:x[0],type:x[1],date:"",next:"",notes:x[2]})});let prev=new Set(p.preventatives.map(v=>v.name));PREVENTS.forEach(n=>{if(!prev.has(n))p.preventatives.push({id:uid(),name:n,date:"",brand:""})})}
function addPet(){if(!APP.pro&&state.pets.length>=APP.maxPets){alert("PetLog Lite keeps up to 2 pets. PetLog Pro unlocks unlimited pets.");return}let p=blankPet();seedHealth(p);state.pets.push(p);currentPetId=p.id;tab="profiles";save()}
function deletePet(id){if(!confirm("Delete this pet and all of their records?"))return;state.pets=state.pets.filter(p=>p.id!==id);currentPetId=state.pets[0]?.id||null;save()}
function setCurrent(id){currentPetId=id;render()}
function setTab(t){tab=t;render()}
function setPetField(k,v){let p=pet();if(!p)return;let old=p.species;p[k]=v;if(k==="species"&&old!==v){let untouched=p.vaccines.every(x=>!x.date&&!x.next)&&p.preventatives.every(x=>!x.date&&!x.brand);if(untouched){p.vaccines=[];p.preventatives=[]}seedHealth(p)}save()}
function render(){setTheme();let p=pet();document.title=APP.title+" - Offline Pet Health & Care Tracker";document.getElementById("app").innerHTML=`${shell(p)}`;afterRender()}
function shell(p){let tabs=["profiles","weight","vaccines","meds","feeding","vet","notes"].concat(APP.pro?["costs","emergency"]:[]).concat(["settings"]);if(!APP.pro&&["costs","emergency"].includes(tab))tab="profiles";return`
<header class="top">
 <div class="brand"><div class="logo" aria-hidden="true">🐾</div><div><h1>${APP.title}</h1><p class="tag">Offline pet health and care journal. No account. No cloud. No subscription.</p></div></div>
 <div class="price">${APP.pro?APP.price+" one-time":"Free Lite"}</div>
</header>
${APP.pro?"":`<div class="banner"><strong>Get Pro - Unlimited Pets.</strong> PetLog Pro adds unlimited pets, cost overview, emergency cards, and CSV exports.</div>`}
<div class="toolbar no-print">
 <div class="pet-select"><button class="btn" onclick="addPet()">＋ Add pet</button>${state.pets.length?`<label>Current pet <select onchange="setCurrent(this.value)">${state.pets.map(x=>`<option value="${x.id}" ${x.id===p?.id?"selected":""}>${h(x.name||"Unnamed")} (${h(x.species)})</option>`).join("")}</select></label>`:""}</div>
 <div class="actions"><span class="pill">Unit: ${state.settings.unit}</span><span class="pill">Temp: °${state.settings.temp}</span></div>
</div>
${alerts(p)}
<nav class="tabs no-print" aria-label="PetLog sections">${tabs.map(t=>`<button class="tab" aria-current="${tab===t}" onclick="setTab('${t}')">${icon(t)} ${label(t)}</button>`).join("")}</nav>
<main class="view">${p||tab==="settings"?view(tab,p):emptyPets()}</main>
<footer>PetLog stores everything in this browser with localStorage key <strong>${APP.store}</strong>. Keep JSON backups for long-term records.</footer>`}
function icon(t){return{profiles:"♡",weight:"〽",vaccines:"✚",meds:"☑",feeding:"☕",vet:"⌂",notes:"✎",costs:"$",emergency:"!",settings:"⚙"}[t]||"•"}
function label(t){return{profiles:"Profiles",weight:"Weight",vaccines:"Vaccines",meds:"Medication",feeding:"Feeding",vet:"Vet Visits",notes:"Daily Notes",costs:"Costs",emergency:"Emergency Card",settings:"Settings"}[t]||t}
function emptyPets(){return`<section class="empty"><h2>Start with the pet you love most.</h2><p>Add a pet profile to begin tracking care, health notes, and vet-ready records.</p><button class="btn" onclick="addPet()">＋ Add your first pet</button></section>`}
function alerts(p){if(!p)return"";let rows=[];p.vaccines.forEach(v=>{if(v.next){let d=daysUntil(v.next);if(d<0)rows.push(`${h(v.name)} is overdue by ${Math.abs(d)} day${Math.abs(d)===1?"":"s"}.`);else if(d<=30)rows.push(`${h(v.name)} is due in ${d} day${d===1?"":"s"}.`)}});p.preventatives.forEach(v=>{if(v.date){let due=addDays(v.date,30),d=daysUntil(due);if(d<0)rows.push(`${h(v.name)} preventative is overdue by ${Math.abs(d)} day${Math.abs(d)===1?"":"s"}.`);else if(d<=7)rows.push(`${h(v.name)} preventative is due in ${d} day${d===1?"":"s"}.`)}});return rows.length?`<div class="alerts" role="status"><strong>Care reminders for ${h(p.name)}:</strong><ul>${rows.map(r=>`<li>${r}</li>`).join("")}</ul></div>`:""}
function view(t,p){return{profiles:profileView,weight:weightView,vaccines:vaccineView,meds:medView,feeding:feedingView,vet:vetView,notes:notesView,costs:costView,emergency:emergencyView,settings:settingsView}[t](p)}
function speciesOptions(v){return SPECIES.map(s=>`<option ${s===v?"selected":""}>${s}</option>`).join("")}
function profileView(p){return`<section class="grid"><div class="col-4 panel stack"><h2>${h(p.name)}</h2>${p.photo?`<img class="pet-photo" src="${p.photo}" alt="${h(p.name)} photo">`:`<div class="pet-photo">Photo</div>`}<label>Photo <input type="file" accept="image/*" onchange="photoInput(this.files[0])"><span class="hint">Resized in-browser to stay under 200KB.</span></label><div class="actions"><button class="btn warn" onclick="deletePet('${p.id}')">Delete pet</button></div></div><div class="col-8 panel"><h2>Profile</h2><div class="grid">
${field("Name","name",p.name)}<label class="col-6">Species <select onchange="setPetField('species',this.value)">${speciesOptions(p.species)}</select></label>${field("Breed","breed",p.breed)}${field("Birthday","birthDate",p.birthDate,"date")}${field("Adoption date","adoptionDate",p.adoptionDate,"date")}<label class="col-6">Sex <select onchange="setPetField('sex',this.value)">${SEX.map(s=>`<option ${s===p.sex?"selected":""}>${s}</option>`).join("")}</select></label><label class="col-6">Spay/neuter status <select onchange="setPetField('neutered',this.value)">${["Unknown","Spayed","Neutered","Intact"].map(s=>`<option ${s===p.neutered?"selected":""}>${s}</option>`).join("")}</select></label>${field("Microchip #","microchip",p.microchip)}${area("Special notes, allergies, chronic conditions","notes",p.notes)}${area("Owner contact","ownerContact",p.ownerContact)}${area("Vet / clinic contact","vetContact",p.vetContact)}${area("Pet insurance info","insurance",p.insurance)}</div></div><div class="col-12 panel"><h2>All pets</h2><div class="stack">${state.pets.map(x=>`<div class="pet-tile"><div class="mini-photo">${x.photo?`<img class="mini-photo" src="${x.photo}" alt="">`:"🐾"}</div><div><strong>${h(x.name)}</strong><div class="hint">${h(x.species)} ${x.breed?"• "+h(x.breed):""}</div></div><button class="btn secondary small" onclick="setCurrent('${x.id}')">Open</button></div>`).join("")}</div></div></section>`}
function field(lbl,k,v,type="text"){return`<label class="col-6">${lbl}<input type="${type}" value="${h(v)}" onchange="setPetField('${k}',this.value)"></label>`}
function area(lbl,k,v){return`<label class="col-12">${lbl}<textarea onchange="setPetField('${k}',this.value)">${h(v)}</textarea></label>`}
function photoInput(file){if(!file)return;let p=pet(),r=new FileReader();r.onload=()=>{let img=new Image();img.onload=()=>{let max=640,scale=Math.min(1,max/img.width,max/img.height),w=Math.round(img.width*scale),hgt=Math.round(img.height*scale),c=document.createElement("canvas"),q=.86;c.width=w;c.height=hgt;c.getContext("2d").drawImage(img,0,0,w,hgt);let data=c.toDataURL("image/jpeg",q);while(data.length>200*1024&&q>.35){q-=.08;data=c.toDataURL("image/jpeg",q)}while(data.length>200*1024&&c.width>260){let c2=document.createElement("canvas");c2.width=Math.round(c.width*.78);c2.height=Math.round(c.height*.78);c2.getContext("2d").drawImage(c,0,0,c2.width,c2.height);c=c2;data=c.toDataURL("image/jpeg",.52)}if(data.length>200*1024){alert("This photo is still over 200KB. Try a smaller image.");return}p.photo=data;save()};img.src=r.result};r.readAsDataURL(file)}
function weightView(p){let unit=state.settings.unit,last=[...p.weight].sort((a,b)=>a.date.localeCompare(b.date)).slice(-1)[0],trend=weightTrend(p);return`<section class="grid"><div class="col-4 panel stack"><h2>Weight Tracker</h2><form id="weightForm" class="stack" onsubmit="addWeight(event)"><label>Date <input name="date" type="date" value="${iso()}" required></label><label>Weight (${unit}) <input name="weight" type="number" step="0.01" min="0" required></label><label>Target weight (${unit}) <input type="number" step="0.01" min="0" value="${p.targetWeight?displayWeight(p.targetWeight).toFixed(2):""}" onchange="setTargetWeight(this.value)"></label><button class="btn">＋ Add weight</button></form><div class="kpi"><span>Latest</span><strong>${last?displayWeight(last.lb).toFixed(2)+" "+unit:"No entries"}</strong><span>${trend}</span></div>${APP.pro?`<button class="btn secondary" onclick="exportWeights('${p.id}')">Export weight CSV</button>`:""}</div><div class="col-8 panel"><h2>Weight trend</h2><canvas id="weightChart" width="900" height="320" aria-label="Weight line chart"></canvas><div class="scroll">${recordTable(["Date","Weight","Notes",""],p.weight.sort((a,b)=>b.date.localeCompare(a.date)).map(r=>[r.date,displayWeight(r.lb).toFixed(2)+" "+unit,h(r.notes||""),`<button class="btn small secondary" onclick="delItem('weight','${r.id}')">Remove</button>`]))}</div></div></section>`}
function addWeight(e){e.preventDefault();let p=pet(),f=new FormData(e.target);p.weight.push({id:uid(),date:f.get("date"),lb:inputWeight(f.get("weight")),notes:""});save()}
function setTargetWeight(v){pet().targetWeight=v?inputWeight(v):"";save()}
function weightTrend(p){let a=[...p.weight].sort((x,y)=>x.date.localeCompare(y.date));if(a.length<2)return"Trend: not enough data";let d=a.at(-1).lb-a.at(-2).lb;if(Math.abs(d)<0.2)return"Trend: stable";return d>0?"Trend: ↑ gaining":"Trend: ↓ losing"}
function drawWeight(){let p=pet();if(!p||tab!=="weight")return;let c=document.getElementById("weightChart");if(!c)return;let ctx=c.getContext("2d"),r=[...p.weight].sort((a,b)=>a.date.localeCompare(b.date));drawLine(ctx,c,r.map(x=>displayWeight(x.lb)),r.map(x=>x.date),state.settings.unit)}
function drawLine(ctx,c,vals,labels,unit){ctx.clearRect(0,0,c.width,c.height);ctx.fillStyle="#fff";ctx.fillRect(0,0,c.width,c.height);let pad=48,w=c.width-pad*2,h=c.height-pad*2;ctx.strokeStyle="#c9ad95";ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(pad,pad);ctx.lineTo(pad,pad+h);ctx.lineTo(pad+w,pad+h);ctx.stroke();if(!vals.length){ctx.fillStyle="#715b4d";ctx.fillText("Add weight entries to draw the chart.",pad+20,pad+40);return}let min=Math.min(...vals),max=Math.max(...vals);if(min===max){min-=1;max+=1}ctx.strokeStyle=getComputedStyle(document.documentElement).getPropertyValue("--brand").trim();ctx.lineWidth=4;ctx.beginPath();vals.forEach((v,i)=>{let x=pad+(vals.length===1?w/2:i*w/(vals.length-1)),y=pad+h-(v-min)/(max-min)*h;i?ctx.lineTo(x,y):ctx.moveTo(x,y)});ctx.stroke();ctx.fillStyle="#34251e";vals.forEach((v,i)=>{let x=pad+(vals.length===1?w/2:i*w/(vals.length-1)),y=pad+h-(v-min)/(max-min)*h;ctx.beginPath();ctx.arc(x,y,5,0,7);ctx.fill();if(i===vals.length-1)ctx.fillText(v.toFixed(1)+" "+unit,x-28,y-12)});ctx.fillStyle="#715b4d";ctx.fillText(labels[0]||"",pad,pad+h+28);ctx.fillText(labels.at(-1)||"",pad+w-82,pad+h+28)}
function vaccineView(p){let rows=p.vaccines.sort((a,b)=>(a.next||"9999").localeCompare(b.next||"9999")).map(v=>[h(v.name),h(v.type),dateInput("vaccines",v.id,"date",v.date),dateInput("vaccines",v.id,"next",v.next),duePill(v.next),textInput("vaccines",v.id,"notes",v.notes),`<button class="btn small secondary" onclick="delItem('vaccines','${v.id}')">Remove</button>`]);let prev=p.preventatives.map(v=>[h(v.name),dateInput("preventatives",v.id,"date",v.date),textInput("preventatives",v.id,"brand",v.brand),v.date?duePill(addDays(v.date,30)):"",`<button class="btn small secondary" onclick="delItem('preventatives','${v.id}')">Remove</button>`]);return`<section class="stack printable"><div class="actions no-print"><button class="btn" onclick="addVaccine()">＋ Add vaccine</button><button class="btn secondary" onclick="addPreventative()">＋ Add preventative</button><button class="btn good" onclick="window.print()">Print-to-PDF vaccine record</button></div><div class="print-card"><h2>Vaccinations for ${h(p.name)}</h2><p class="hint">Preloaded guidance follows AAHA canine and AAHA/AAFP feline recommendations. Ask your veterinarian what applies to your pet, region, lifestyle, and local law.</p><div class="scroll">${recordTable(["Vaccine","Type","Date given","Next due","Status","Notes",""],rows)}</div></div><div class="print-card"><h2>Preventatives</h2><p class="hint">Due status assumes a 30-day interval unless your veterinarian or product label says otherwise.</p><div class="scroll">${recordTable(["Preventative","Last date","Brand","Estimated due",""],prev)}</div></div></section>`}
function addVaccine(){let name=prompt("Vaccine name");if(!name)return;pet().vaccines.push({id:uid(),name,type:"Custom",date:"",next:"",notes:""});save()}
function addPreventative(){let name=prompt("Preventative name");if(!name)return;pet().preventatives.push({id:uid(),name,date:"",brand:""});save()}
function duePill(d){if(!d)return`<span class="pill">No due date</span>`;let n=daysUntil(d),cls=n<0?"due-overdue":n<=30?"due-soon":"due-ok",txt=n<0?`${Math.abs(n)} days overdue`:n===0?"Due today":`${n} days`;return`<span class="pill ${cls}">${txt}</span>`}
function dateInput(arr,id,k,v){return`<input type="date" value="${h(v)}" onchange="setItem('${arr}','${id}','${k}',this.value)">`}
function textInput(arr,id,k,v){return`<input type="text" value="${h(v)}" onchange="setItem('${arr}','${id}','${k}',this.value)">`}
function medView(p){let active=p.meds.map(m=>{let done=(m.history||[]).find(x=>x.date===iso())?.done;return`<div class="panel"><div class="row"><strong>${h(m.name)}</strong><span class="pill">${h(m.dosage)}</span><span class="pill">${h(m.frequency)}</span></div><p>${h(m.start)} to ${h(m.end||"ongoing")}</p><label class="row"><input type="checkbox" ${done?"checked":""} onchange="toggleMed('${m.id}',this.checked)"> Today given</label><label>Side-effect notes <textarea onchange="setItem('meds','${m.id}','sideEffects',this.value)">${h(m.sideEffects||"")}</textarea></label><details><summary>History (${(m.history||[]).length})</summary>${(m.history||[]).slice().reverse().map(x=>`<p>${x.date}: ${x.done?"given":"not given"}</p>`).join("")||"<p>No checklist history yet.</p>"}</details><button class="btn small secondary" onclick="delItem('meds','${m.id}')">Remove</button></div>`}).join("")||`<div class="empty">No medications logged yet.</div>`;return`<section class="grid"><div class="col-4 panel"><h2>Medication Log</h2><p class="disclaimer">Not medical advice, consult your vet.</p><form id="medForm" class="stack" onsubmit="addMed(event)"><label>Drug name <input name="name" required></label><label>Dosage <input name="dosage" required></label><label>Frequency <input name="frequency" placeholder="Twice daily" required></label><label>Start date <input name="start" type="date" value="${iso()}"></label><label>End date <input name="end" type="date"></label><label>Side-effect notes <textarea name="sideEffects"></textarea></label><button class="btn">＋ Add medication</button></form>${APP.pro?`<button class="btn secondary" onclick="exportMeds('${p.id}')">Export meds CSV</button>`:""}</div><div class="col-8 stack">${active}</div></section>`}
function addMed(e){e.preventDefault();let f=new FormData(e.target);pet().meds.push({id:uid(),name:f.get("name"),dosage:f.get("dosage"),frequency:f.get("frequency"),start:f.get("start"),end:f.get("end"),sideEffects:f.get("sideEffects"),history:[]});save()}
function toggleMed(id,done){let m=pet().meds.find(x=>x.id===id);m.history=m.history||[];let r=m.history.find(x=>x.date===iso());if(r)r.done=done;else m.history.push({date:iso(),done});save()}
function feedingView(p){return`<section class="grid"><div class="col-4 panel"><h2>Feeding Log</h2><form id="feedForm" class="stack" onsubmit="addFeed(event)"><label>Date <input name="date" type="date" value="${iso()}"></label><label>Meal <input name="meal" placeholder="Breakfast"></label><label>Food brand/type <input name="food"></label><label>Portion <input name="portion" placeholder="1 cup"></label><label>Treats / supplements <input name="treats"></label><label>Water intake (optional) <input name="water"></label><button class="btn">＋ Add meal</button></form><label>Food allergies / restrictions <textarea onchange="setPetField('foodRestrictions',this.value)">${h(p.foodRestrictions||"")}</textarea></label><button class="btn secondary" onclick="addDietChange()">＋ Diet change</button></div><div class="col-8 panel"><h2>Meals</h2><div class="scroll">${recordTable(["Date","Meal","Food","Portion","Treats","Water",""],p.feeding.slice().sort((a,b)=>b.date.localeCompare(a.date)).map(x=>[x.date,h(x.meal),h(x.food),h(x.portion),h(x.treats),h(x.water),`<button class="btn small secondary" onclick="delItem('feeding','${x.id}')">Remove</button>`]))}</div><h3>Diet change history</h3>${p.diet.map(d=>`<p><strong>${h(d.date)}</strong> ${h(d.note)} <button class="btn small secondary" onclick="delItem('diet','${d.id}')">Remove</button></p>`).join("")||"<p>No diet changes logged.</p>"}</div></section>`}
function addFeed(e){e.preventDefault();let f=new FormData(e.target);pet().feeding.push({id:uid(),date:f.get("date"),meal:f.get("meal"),food:f.get("food"),portion:f.get("portion"),treats:f.get("treats"),water:f.get("water")});save()}
function addDietChange(){let note=prompt("Diet change notes");if(!note)return;pet().diet.push({id:uid(),date:iso(),note});save()}
function vetView(p){let rows=p.visits.slice().sort((a,b)=>b.date.localeCompare(a.date)).map(v=>[v.date,h(v.clinic),h(v.doctor),h(v.reason),h(v.diagnosis),h(v.treatment),money(v.cost),h(v.next),h(v.notes),`<button class="btn small secondary" onclick="delItem('visits','${v.id}')">Remove</button>`]);return`<section class="grid printable"><div class="col-4 panel no-print"><h2>Vet Visits</h2><form id="visitForm" class="stack" onsubmit="addVisit(event)"><label>Date <input name="date" type="date" value="${iso()}"></label><label>Clinic <input name="clinic"></label><label>Doctor <input name="doctor"></label><label>Reason <input name="reason"></label><label>Diagnosis <input name="diagnosis"></label><label>Treatment <input name="treatment"></label><label>Cost <input name="cost" type="number" step="0.01" min="0"></label><label>Next appointment <input name="next" type="date"></label><label>Test values / notes <textarea name="notes"></textarea></label><button class="btn">＋ Add visit</button><button type="button" class="btn good" onclick="window.print()">Print-to-PDF</button></form></div><div class="col-8 print-card"><h2>Vet visit record for ${h(p.name)}</h2><div class="scroll">${recordTable(["Date","Clinic","Doctor","Reason","Diagnosis","Treatment","Cost","Next","Notes",""],rows)}</div></div></section>`}
function addVisit(e){e.preventDefault();let f=new FormData(e.target);pet().visits.push({id:uid(),date:f.get("date"),clinic:f.get("clinic"),doctor:f.get("doctor"),reason:f.get("reason"),diagnosis:f.get("diagnosis"),treatment:f.get("treatment"),cost:f.get("cost"),next:f.get("next"),notes:f.get("notes")});save()}
function notesView(p){let rows=p.notesLog.slice().sort((a,b)=>b.date.localeCompare(a.date)).map(n=>[n.date,h(n.mood),h(n.appetite),h(n.elimination),h(n.activity),h(n.flags.join(", ")),h(n.text),`<button class="btn small secondary" onclick="delItem('notesLog','${n.id}')">Remove</button>`]);return`<section class="grid"><div class="col-4 panel"><h2>Daily Notes</h2><form id="noteForm" class="stack" onsubmit="addNote(event)"><label>Date <input name="date" type="date" value="${iso()}"></label>${emojiField("mood","Mood",["😊","😴","😟","😖"])}${emojiField("appetite","Appetite",["🍽️","👍","🙁","🚫"])}${emojiField("elimination","Elimination",["✅","💩","💧","⚠️"])}${emojiField("activity","Activity",["⚡","🚶","💤","😣"])}<fieldset><legend>Abnormal flags</legend>${["Vomiting","Diarrhea","Limping","Appetite loss","Coughing","Itching","Accident","Pain"].map(x=>`<label class="row"><input type="checkbox" name="flags" value="${x}"> ${x}</label>`).join("")}</fieldset><label>Free text <textarea name="text"></textarea></label><button class="btn">＋ Add note</button></form></div><div class="col-8 panel"><h2>Calendar review</h2><label class="no-print">Month <input type="month" value="${noteMonth}" onchange="noteMonth=this.value;render()"></label>${calendar(p)}<h3>Notes</h3><div class="scroll">${recordTable(["Date","Mood","Appetite","Elimination","Activity","Flags","Text",""],rows)}</div></div></section>`}
function emojiField(name,label,items){return`<label>${label}<input type="hidden" name="${name}" value="${items[0]}"><span class="emoji-set">${items.map((x,i)=>`<button type="button" class="${i===0?"active":""}" aria-label="${label} ${x}" onclick="pickEmoji(this,'${name}','${x}')">${x}</button>`).join("")}</span></label>`}
function pickEmoji(btn,name,val){let wrap=btn.parentElement;wrap.querySelectorAll("button").forEach(b=>b.classList.remove("active"));btn.classList.add("active");wrap.parentElement.querySelector(`input[name="${name}"]`).value=val}
function addNote(e){e.preventDefault();let f=new FormData(e.target);pet().notesLog.push({id:uid(),date:f.get("date"),mood:f.get("mood"),appetite:f.get("appetite"),elimination:f.get("elimination"),activity:f.get("activity"),flags:f.getAll("flags"),text:f.get("text")});save()}
function calendar(p){let [y,m]=noteMonth.split("-").map(Number),first=new Date(y,m-1,1),days=new Date(y,m,0).getDate(),pad=first.getDay(),cells=[];for(let i=0;i<pad;i++)cells.push(`<div class="day" aria-hidden="true"></div>`);for(let d=1;d<=days;d++){let date=`${noteMonth}-${String(d).padStart(2,"0")}`,ns=p.notesLog.filter(n=>n.date===date);cells.push(`<div class="day"><strong>${d}</strong>${ns.map(n=>`<span class="dot"></span>${h(n.mood)} ${h(n.flags[0]||"")}<br>`).join("")}</div>`)}return`<div class="calendar">${["Sun","Mon","Tue","Wed","Thu","Fri","Sat"].map(x=>`<strong>${x}</strong>`).join("")}${cells.join("")}</div>`}
function costView(p){let now=new Date(),ym=iso().slice(0,7),yr=String(now.getFullYear()),month=p.costs.filter(c=>c.date?.startsWith(ym)).reduce((s,c)=>s+Number(c.amount||0),0),year=p.costs.filter(c=>c.date?.startsWith(yr)).reduce((s,c)=>s+Number(c.amount||0),0),rows=p.costs.slice().sort((a,b)=>b.date.localeCompare(a.date)).map(c=>[c.date,h(c.category),money(c.amount),h(c.vendor),h(c.notes),`<button class="btn small secondary" onclick="delItem('costs','${c.id}')">Remove</button>`]);return`<section class="grid"><div class="col-4 panel"><h2>Cost Overview</h2><p class="disclaimer">Personal records only, not accounting.</p><form id="costForm" class="stack" onsubmit="addCost(event)"><label>Date <input name="date" type="date" value="${iso()}"></label><label>Category <select name="category">${["Food","Medical","Grooming","Supplies","Insurance"].map(x=>`<option>${x}</option>`).join("")}</select></label><label>Amount <input name="amount" type="number" step="0.01" min="0"></label><label>Merchant / note <input name="vendor"></label><label>Details <textarea name="notes"></textarea></label><button class="btn">＋ Add cost</button></form><div class="grid"><div class="col-6 kpi"><span>This month</span><strong>${money(month)}</strong></div><div class="col-6 kpi"><span>This year</span><strong>${money(year)}</strong></div></div><button class="btn secondary" onclick="exportCosts('${p.id}')">Export costs CSV</button></div><div class="col-8 panel"><h2>By category</h2><canvas id="costChart" width="900" height="320" aria-label="Cost bar chart"></canvas><div class="scroll">${recordTable(["Date","Category","Amount","Merchant","Notes",""],rows)}</div></div></section>`}
function addCost(e){e.preventDefault();let f=new FormData(e.target);pet().costs.push({id:uid(),date:f.get("date"),category:f.get("category"),amount:f.get("amount"),vendor:f.get("vendor"),notes:f.get("notes")});save()}
function drawCosts(){let p=pet();if(!p||tab!=="costs")return;let c=document.getElementById("costChart");if(!c)return;let cats=["Food","Medical","Grooming","Supplies","Insurance"],vals=cats.map(cat=>p.costs.filter(x=>x.category===cat).reduce((s,x)=>s+Number(x.amount||0),0));let ctx=c.getContext("2d");ctx.clearRect(0,0,c.width,c.height);ctx.fillStyle="#fff";ctx.fillRect(0,0,c.width,c.height);let pad=50,w=c.width-pad*2,h=c.height-pad*2,max=Math.max(...vals,1);ctx.strokeStyle="#c9ad95";ctx.beginPath();ctx.moveTo(pad,pad);ctx.lineTo(pad,pad+h);ctx.lineTo(pad+w,pad+h);ctx.stroke();vals.forEach((v,i)=>{let bw=w/cats.length*.62,x=pad+i*w/cats.length+(w/cats.length-bw)/2,bh=v/max*h;ctx.fillStyle=getComputedStyle(document.documentElement).getPropertyValue("--brand").trim();ctx.fillRect(x,pad+h-bh,bw,bh);ctx.fillStyle="#34251e";ctx.fillText(money(v),x,pad+h-bh-8);ctx.save();ctx.translate(x,pad+h+15);ctx.rotate(-.35);ctx.fillText(cats[i],0,0);ctx.restore()})}
function emergencyView(p){return`<section class="stack"><div class="actions no-print"><button class="btn good" onclick="window.print()">Print-to-PDF emergency card</button></div><div class="print-card emergency"><div>${p.photo?`<img class="pet-photo" src="${p.photo}" alt="${h(p.name)} photo">`:`<div class="pet-photo">Photo</div>`}</div><div><h2>Emergency Card: ${h(p.name)}</h2><p><strong>Species/Breed:</strong> ${h(p.species)} ${h(p.breed)}</p><p><strong>Microchip:</strong> ${h(p.microchip||"Not recorded")}</p><p><strong>Owner contact:</strong><br>${h(p.ownerContact||"Not recorded").replace(/\n/g,"<br>")}</p><p><strong>Vet contact:</strong><br>${h(p.vetContact||"Not recorded").replace(/\n/g,"<br>")}</p><p><strong>Allergies / restrictions / conditions:</strong><br>${h((p.notes||"")+"\n"+(p.foodRestrictions||"")).replace(/\n/g,"<br>")}</p><p><strong>Insurance:</strong><br>${h(p.insurance||"Not recorded").replace(/\n/g,"<br>")}</p><p class="hint">Wallet/fridge-ready. Update after vet or medication changes.</p></div></div></section>`}
function settingsView(){return`<section class="grid"><div class="col-6 panel stack"><h2>Settings</h2><label>Language <select disabled><option>English</option></select></label><label>Weight units <select onchange="state.settings.unit=this.value;save()"><option ${state.settings.unit==="lb"?"selected":""}>lb</option><option ${state.settings.unit==="kg"?"selected":""}>kg</option></select></label><label>Temperature units <select onchange="state.settings.temp=this.value;save()"><option ${state.settings.temp==="F"?"selected":""}>F</option><option ${state.settings.temp==="C"?"selected":""}>C</option></select></label><label>Color theme <select onchange="state.settings.theme=this.value;save()"><option value="orange" ${state.settings.theme==="orange"?"selected":""}>Warm Orange</option><option value="forest" ${state.settings.theme==="forest"?"selected":""}>Forest Green</option><option value="blue" ${state.settings.theme==="blue"?"selected":""}>Soft Blue</option></select></label></div><div class="col-6 panel stack"><h2>Backup</h2><button class="btn" onclick="exportJson()">Download JSON backup</button><label>Import JSON backup <input type="file" accept="application/json" onchange="importJson(this.files[0])"></label>${APP.pro?`<h3>CSV exports</h3><button class="btn secondary" onclick="exportAll('weight')">Export all weights CSV</button><button class="btn secondary" onclick="exportAll('meds')">Export all meds CSV</button><button class="btn secondary" onclick="exportAll('costs')">Export all costs CSV</button>`:`<p class="banner">CSV export is included in PetLog Pro.</p>`}</div></section>`}
function exportJson(){download("petlog-backup.json",JSON.stringify(state,null,2),"application/json")}
function importJson(file){if(!file)return;let r=new FileReader();r.onload=()=>{try{let data=JSON.parse(r.result);if(!data.pets||!data.settings)throw Error("Invalid backup");if(!APP.pro&&data.pets.length>APP.maxPets){alert("Lite can import only the first 2 pets.");data.pets=data.pets.slice(0,APP.maxPets)}state=data;currentPetId=state.pets[0]?.id||null;save()}catch(e){alert("Could not import this JSON backup.")}};r.readAsText(file)}
function setItem(arr,id,k,v){let item=pet()[arr].find(x=>x.id===id);if(item)item[k]=v;save()}
function delItem(arr,id){pet()[arr]=pet()[arr].filter(x=>x.id!==id);save()}
function recordTable(head,rows){if(!rows.length)return`<div class="empty">No records yet.</div>`;return`<table><thead><tr>${head.map(x=>`<th>${x}</th>`).join("")}</tr></thead><tbody>${rows.map(r=>`<tr>${r.map(c=>`<td>${c}</td>`).join("")}</tr>`).join("")}</tbody></table>`}
function exportWeights(id){let p=state.pets.find(x=>x.id===id);download(`${p.name||"pet"}-weights.csv`,csv([["Pet","Date","Weight lb","Weight kg"],...p.weight.map(w=>[p.name,w.date,w.lb,lbToKg(w.lb).toFixed(3)])]),"text/csv")}
function exportMeds(id){let p=state.pets.find(x=>x.id===id);download(`${p.name||"pet"}-meds.csv`,csv([["Pet","Drug","Dosage","Frequency","Start","End","Side effects","History"],...p.meds.map(m=>[p.name,m.name,m.dosage,m.frequency,m.start,m.end,m.sideEffects,(m.history||[]).map(x=>x.date+":"+x.done).join("; ")])]),"text/csv")}
function exportCosts(id){let p=state.pets.find(x=>x.id===id);download(`${p.name||"pet"}-costs.csv`,csv([["Pet","Date","Category","Amount","Merchant","Notes"],...p.costs.map(c=>[p.name,c.date,c.category,c.amount,c.vendor,c.notes])]),"text/csv")}
function exportAll(kind){let rows=[];state.pets.forEach(p=>{if(kind==="weight")p.weight.forEach(w=>rows.push([p.name,w.date,w.lb,lbToKg(w.lb).toFixed(3)]));if(kind==="meds")p.meds.forEach(m=>rows.push([p.name,m.name,m.dosage,m.frequency,m.start,m.end,m.sideEffects]));if(kind==="costs")p.costs.forEach(c=>rows.push([p.name,c.date,c.category,c.amount,c.vendor,c.notes]))});let heads={weight:["Pet","Date","Weight lb","Weight kg"],meds:["Pet","Drug","Dosage","Frequency","Start","End","Side effects"],costs:["Pet","Date","Category","Amount","Merchant","Notes"]};download(`petlog-${kind}.csv`,csv([heads[kind],...rows]),"text/csv")}
function afterRender(){if(tab==="weight")drawWeight();if(tab==="costs")drawCosts()}
render();
</script>
</body>
</html>
